services:
  runtime:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.runtime
    ports:
      - "4321:4321"
    environment:
      RUNTIME_HOST: 0.0.0.0
      RUNTIME_PORT: 4321
      DATABASE_URL: file:/data/dev.db
      WORKTREE_ROOT: /data/worktrees
      CLAUDE_CODE_EXECUTABLE: ${CLAUDE_CODE_EXECUTABLE:-claude}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
    volumes:
      - runtime_data:/data
      - ../..:/workspace/repos
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:4321/health').then((r)=>{if(!r.ok){process.exit(1);}}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    ports:
      - "5173:5173"
    depends_on:
      runtime:
        condition: service_healthy

volumes:
  runtime_data:
